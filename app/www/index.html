<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raqamli Mahalla</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>🏛 Raqamli Mahalla Test 777</h1>

<div class="card">

<h2>📲 Fuqaro kabineti</h2>

<input type="text" id="fullname" placeholder="F.I.SH">

<input type="text" id="passport" placeholder="Passport seriya">

<input type="text" id="jshshir" placeholder="JSHSHIR">

<input type="text" id="phoneNumber" placeholder="+998901234567">

<input
type="date"
id="birthDate"
placeholder="Tug'ilgan sana">

<label>🌍 Viloyat</label>

<select id="region">

<option value="">Viloyatni tanlang</option>

</select>

<label>🏙 Tuman</label>

<select id="district">

<option value="">Tumanni tanlang</option>

</select>

<label>🏘 Mahalla</label>

<select id="mahalla">

<option value="">Mahallani tanlang</option>

</select>

<input
type="email"
id="email"
placeholder="Email manzil">

<button onclick="sendCode()">
📩 SMS kod yuborish
</button>

<input type="text" id="verificationCode" placeholder="SMS kod">

<button onclick="verifyCode()">
✅ Kodni tasdiqlash
</button>

<button onclick="openCamera()">
📷 Kamerani yoqish
</button>

<img id="passportPreview">

<div id="loginStatus">
⏳ Login qilinmagan
</div>

<div id="userBox" style="display:none;">

<h3>✅ Foydalanuvchi tizimga kirdi</h3>

<p id="userInfo"></p>

<button onclick="logoutUser()">
🚪 Chiqish
</button>
<button onclick="editProfile()">
✏️ Profilni tahrirlash
</button>
<button onclick="window.location.href='admin.html'">
🛠 Admin Panel
</button>
</div>

</div>

<div class="card" style="margin-top:20px;">

<h2>📄 Ariza yuborish</h2>

<input
type="text"
id="applicationTitle"
placeholder="Ariza mavzusi">

<textarea
id="applicationText"
placeholder="Ariza matni..."
style="
width:100%;
height:120px;
margin-top:10px;
padding:10px;
border-radius:10px;
">
</textarea>
<br>

<input
type="file"
id="applicationFile">

<div id="selectedFile">

📎 Fayl tanlanmagan

</div>
<button onclick="sendApplication()">
📤 Ariza yuborish
</button>

<div id="applicationStatus">
⏳ Ariza yuborilmagan
</div>

<hr>

<h2>📋 Mening arizalarim</h2>

<button onclick="loadApplications()">
📥 Arizalarni yuklash
</button>

<div id="applicationsList">
Arizalar hali yuklanmagan
</div>

<hr>

<h2>🔔 Bildirishnomalar</h2>

<div id="notificationsList">

Bildirishnomalar yo'q

</div>
</div>

</div>

<script src="cordova.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/camera.js"></script>
<script src="js/application.js"></script>
<script src="js/profile.js"></script>
<script src="js/geo.js"></script>
<script src="js/validation.js"></script>
</body>
</html>
