<!DOCTYPE html>
<html lang="uz">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

background:
linear-gradient(
135deg,
#020617,
#0f172a,
#1e293b
);

color:white;

}

.box{

width:400px;

padding:35px;

border-radius:30px;

background:
rgba(255,255,255,0.07);

backdrop-filter:blur(18px);

border:
1px solid rgba(255,255,255,0.1);

box-shadow:
0 10px 40px rgba(0,0,0,0.4);

}

.logo{

font-size:32px;

font-weight:bold;

text-align:center;

margin-bottom:25px;

}

input{

width:100%;

padding:15px;

margin-top:15px;

border:none;

outline:none;

border-radius:15px;

background:
rgba(255,255,255,0.08);

color:white;

font-size:16px;

}

input::placeholder{

color:#ddd;

}

button{

width:100%;

padding:15px;

margin-top:18px;

border:none;

border-radius:16px;

font-size:16px;

font-weight:bold;

cursor:pointer;

background:
linear-gradient(
90deg,
#2563eb,
#7c3aed
);

color:white;

transition:0.3s;

}

button:hover{

transform:scale(1.02);

}

.msg{

margin-top:15px;

text-align:center;

}

</style>

</head>

<body>

<div class="box">

<div class="logo">

🏛 Raqamli Mahalla

</div>

<input
type="text"
id="username"
placeholder="Username"
/>

<input
type="password"
id="password"
placeholder="Password"
/>

<button onclick="register()">

Ro‘yxatdan o‘tish

</button>

<button onclick="login()">

Kirish

</button>

<div
class="msg"
id="msg"
>

</div>

</div>

<script>

async function register(){

const username =
document.getElementById('username').value;

const password =
document.getElementById('password').value;

const res =
await fetch('/register',{

method:'POST',

headers:{

'Content-Type':
'application/json'

},

body:JSON.stringify({

username,

password

})

});

const data =
await res.json();

document.getElementById('msg')
.innerHTML =
data.message;

}

async function login(){

const username =
document.getElementById('username').value;

const password =
document.getElementById('password').value;

const res =
await fetch('/login',{

method:'POST',

headers:{

'Content-Type':
'application/json'

},

body:JSON.stringify({

username,

password

})

});

const data =
await res.json();

document.getElementById('msg')
.innerHTML =
data.message;

if(data.token){

localStorage.setItem(
'token',
data.token
);

localStorage.setItem(
'user',
username
);

if(data.role === 'admin'){

window.location =
'/admin.html';

}else{

window.location =
'/index.html';

}

}

}

</script>

</body>

</html>
