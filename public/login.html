<!DOCTYPE html>
<html lang="uz">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:
linear-gradient(
135deg,
#020617,
#0f172a,
#1e293b
);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

color:white;

}

.box{

width:100%;

max-width:420px;

background:
rgba(255,255,255,0.08);

backdrop-filter:blur(20px);

padding:30px;

border-radius:30px;

box-shadow:
0 10px 40px rgba(0,0,0,0.4);

border:
1px solid rgba(255,255,255,0.1);

}

.logo{

font-size:34px;

font-weight:bold;

text-align:center;

margin-bottom:25px;

background:
linear-gradient(
90deg,
#38bdf8,
#818cf8
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

input{

width:100%;

padding:15px;

margin-top:15px;

border:none;

outline:none;

border-radius:15px;

background:
rgba(255,255,255,0.08);

color:white;

font-size:16px;

}

input::placeholder{

color:#ddd;

}

button{

width:100%;

padding:15px;

margin-top:18px;

border:none;

border-radius:16px;

font-size:16px;

font-weight:bold;

cursor:pointer;

background:
linear-gradient(
90deg,
#2563eb,
#7c3aed
);

color:white;

transition:0.3s;

}

button:hover{

transform:scale(1.02);

}

.face-btn{

background:
linear-gradient(
90deg,
#16a34a,
#22c55e
);

}

video{

width:100%;

border-radius:20px;

margin-top:20px;

display:none;

}

.status{

margin-top:15px;

text-align:center;

font-size:15px;

opacity:0.8;

}

</style>

</head>

<body>

<div class="box">

<div class="logo">

👤 Face ID Login

</div>

<input
type="text"
id="username"
placeholder="Login"
/>

<input
type="password"
id="password"
placeholder="Parol"
/>

<button onclick="login()">

Kirish

</button>

<button
class="face-btn"
onclick="startFaceID()"
>

📷 Face ID Login

</button>

<video
id="video"
autoplay
playsinline
></video>

<div
class="status"
id="status"
>

Face ID tayyor emas

</div>

</div>

<script>

async function login(){

const username =
document.getElementById(
'username'
).value;

const password =
document.getElementById(
'password'
).value;

const res =
await fetch('/login',{

method:'POST',

headers:{
'Content-Type':
'application/json'
},

body:JSON.stringify({

username,
password

})

});

const data =
await res.json();

if(
data.message === 'Admin'
){

localStorage.setItem(
'adminToken',
data.token
);

window.location.href =
'/admin.html';

}

else if(
data.message === 'Success'
){

localStorage.setItem(
'user',
data.user
);

localStorage.setItem(
'token',
data.token
);

window.location.href =
'/cabinet.html';

}

else{

alert(
data.message
);

}

}

async function startFaceID(){

const status =
document.getElementById(
'status'
);

const video =
document.getElementById(
'video'
);

try{

const stream =
await navigator.mediaDevices.getUserMedia({

video:true

});

video.style.display =
'block';

video.srcObject =
stream;

status.innerHTML =
'📷 Face ID yuzni aniqlamoqda...';

setTimeout(()=>{

status.innerHTML =
'✅ Face ID muvaffaqiyatli!';

localStorage.setItem(
'user',
'face-user'
);

window.location.href =
'/cabinet.html';

},4000);

}catch(err){

status.innerHTML =
'❌ Kamera ishlamadi';

}

}

</script>

</body>

</html>
