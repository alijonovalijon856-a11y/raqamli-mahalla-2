<!DOCTYPE html>
<html lang="uz">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>Raqamli Mahalla Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#334155
);

overflow:hidden;

}

.container{

width:400px;
max-width:95%;

background:
rgba(255,255,255,0.1);

backdrop-filter:blur(10px);

padding:40px;

border-radius:25px;

box-shadow:
0 8px 32px rgba(0,0,0,0.3);

color:white;

animation:show 1s;

}

@keyframes show{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.logo{

text-align:center;
font-size:35px;
font-weight:bold;
margin-bottom:30px;

}

.inputBox{

margin-bottom:20px;

}

.inputBox input{

width:100%;

padding:15px;

border:none;

border-radius:12px;

font-size:16px;

outline:none;

background:
rgba(255,255,255,0.2);

color:white;

}

.inputBox input::placeholder{

color:#ddd;

}

.buttons{

display:flex;
gap:15px;
margin-top:10px;

}

button{

flex:1;

padding:15px;

border:none;

border-radius:12px;

font-size:16px;

cursor:pointer;

font-weight:bold;

transition:0.3s;

}

.register{

background:#2563eb;
color:white;

}

.login{

background:#16a34a;
color:white;

}

button:hover{

transform:scale(1.05);

}

.msg{

margin-top:20px;
text-align:center;
font-size:18px;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

🏛 Raqamli Mahalla

</div>

<div class="inputBox">

<input
type="text"
id="username"
placeholder="Username"
>

</div>

<div class="inputBox">

<input
type="password"
id="password"
placeholder="Password"
>

</div>

<div class="buttons">

<button
class="register"
onclick="register()"
>

Ro‘yxatdan o‘tish

</button>

<button
class="login"
onclick="login()"
>

Kirish

</button>

</div>

<div
class="msg"
id="msg"
>

</div>

</div>

<script>

async function register(){

const username =
document.getElementById(
'username'
).value;

const password =
document.getElementById(
'password'
).value;

const req =
await fetch('/register',{

method:'POST',

headers:{
'Content-Type':
'application/json'
},

body:JSON.stringify({

username,
password

})

});

const data =
await req.json();

document.getElementById(
'msg'
).innerText =
data.message;

}

async function login(){

const username =
document.getElementById(
'username'
).value;

const password =
document.getElementById(
'password'
).value;

const req =
await fetch('/login',{

method:'POST',

headers:{
'Content-Type':
'application/json'
},

body:JSON.stringify({

username,
password

})

});

const data =
await req.json();

document.getElementById(
'msg'
).innerText =
data.message;

if(data.token){

localStorage.setItem(
'token',
data.token
);

localStorage.setItem(
'user',
username
);

if(data.role==='admin'){

localStorage.setItem(
'adminToken',
data.token
);

window.location.href =
'/admin.html';

}else{

window.location.href =
'/cabinet.html';

}

}

}

</script>

</body>
</html>
