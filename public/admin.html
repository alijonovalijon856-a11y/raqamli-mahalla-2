<script>

const token =
localStorage.getItem('adminToken');

function loadArizalar(){

fetch('/api/all',{

headers:{

Authorization:
'Bearer ' + token

}

})
.then(res=>res.json())

.then(data=>{

document.getElementById(
'jami'
).innerText = data.length;

document.getElementById(
'tasdiq'
).innerText =
data.filter(
a=>a.status==='approved'
).length;

document.getElementById(
'pending'
).innerText =
data.filter(
a=>a.status==='pending'
).length;

let html='';

data.forEach(item=>{

html += `

<div class="item">

<b>${item.ism}</b><br>

Tur: ${item.tur}<br>

Status: ${item.status}<br>

User: ${item.user}

<br><br>

<a
href="/uploads/${item.hujjat}"
target="_blank"
>

📄 Hujjatni ko'rish

</a>

<br><br>

<button
onclick="tasdiqlash(
'${item._id}'
)"
>

✅ Tasdiqlash

</button>

<button
onclick="ochirish(
'${item._id}'
)"
>

🗑 O'chirish

</button>

</div>

`;

});

document.getElementById(
'royxat'
).innerHTML = html;

});

}

function tasdiqlash(id){

fetch('/api/ariza/' + id,{

method:'PUT',

headers:{

Authorization:
'Bearer ' + token

}

})
.then(res=>res.json())

.then(data=>{

alert(data.message);

loadArizalar();

});

}

function ochirish(id){

fetch('/api/ariza/' + id,{

method:'DELETE',

headers:{

Authorization:
'Bearer ' + token

}

})
.then(res=>res.json())

.then(data=>{

alert(data.message);

loadArizalar();

});

}

loadArizalar();

</script>
