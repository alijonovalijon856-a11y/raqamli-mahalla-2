<!DOCTYPE html>
<html lang="uz">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>Raqamli Mahalla Admin</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:
linear-gradient(
135deg,
#020617,
#0f172a,
#1e293b
);

min-height:100vh;

padding:20px;

color:white;

}

.top{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:30px;

flex-wrap:wrap;

gap:15px;

}

.logo{

font-size:35px;

font-weight:bold;

background:
linear-gradient(
90deg,
#38bdf8,
#818cf8
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

.logout{

background:red;

border:none;

padding:12px 20px;

border-radius:12px;

color:white;

cursor:pointer;

font-size:16px;

}

.cards{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:30px;

}

.card{

background:
rgba(255,255,255,0.08);

backdrop-filter:blur(15px);

padding:25px;

border-radius:25px;

box-shadow:
0 8px 32px rgba(0,0,0,0.3);

transition:0.3s;

border:
1px solid rgba(255,255,255,0.1);

}

.card:hover{

transform:
translateY(-5px);

}

.card h2{

font-size:42px;

margin-bottom:10px;

color:#38bdf8;

}

.card p{

font-size:18px;

opacity:0.8;

}

.chart-box{

background:
rgba(255,255,255,0.08);

padding:25px;

border-radius:25px;

margin-bottom:30px;

backdrop-filter:blur(15px);

box-shadow:
0 8px 32px rgba(0,0,0,0.3);

}

.list{

display:grid;

gap:20px;

}

.item{

background:
rgba(255,255,255,0.08);

backdrop-filter:blur(15px);

padding:20px;

border-radius:25px;

box-shadow:
0 8px 32px rgba(0,0,0,0.3);

border:
1px solid rgba(255,255,255,0.1);

}

.item b{

font-size:22px;

}

.item a{

display:inline-block;

margin-top:10px;

color:#38bdf8;

text-decoration:none;

font-weight:bold;

}

.buttons{

margin-top:15px;

display:flex;

gap:10px;

flex-wrap:wrap;

}

.approve{

background:#16a34a;

border:none;

padding:12px 18px;

border-radius:12px;

color:white;

cursor:pointer;

font-size:15px;

}

.delete{

background:#dc2626;

border:none;

padding:12px 18px;

border-radius:12px;

color:white;

cursor:pointer;

font-size:15px;

}

.pending{

background:#f59e0b;

border:none;

padding:12px 18px;

border-radius:12px;

color:white;

cursor:pointer;

font-size:15px;

}

canvas{

margin-top:20px;

}

input,
select{

width:100%;

padding:15px;

border:none;

outline:none;

border-radius:15px;

margin-top:15px;

background:
rgba(255,255,255,0.08);

color:white;

font-size:16px;

}

option{

background:#0f172a;

}

@media(max-width:700px){

.logo{

font-size:25px;

}

.card h2{

font-size:30px;

}

}

</style>

</head>

<body>

<div class="top">

<div class="logo">

🏛 Raqamli Mahalla Admin

</div>

<button
class="logout"
onclick="logout()"
>

🚪 Chiqish

</button>

</div>

<div class="cards">

<div class="card">

<h2 id="jami">0</h2>

<p>📨 Jami arizalar</p>

</div>

<div class="card">

<h2 id="tasdiq">0</h2>

<p>✅ Tasdiqlangan</p>

</div>

<div class="card">

<h2 id="pending">0</h2>

<p>⏳ Jarayonda</p>

</div>

<div class="card">

<h2 id="users">0</h2>

<p>👥 Foydalanuvchilar</p>

</div>

</div>

<div class="chart-box">

<h2>

📊 Analytics Dashboard

</h2>

<canvas id="myChart"></canvas>

</div>

<div class="chart-box">

<h2>

🔎 Search & Filter

</h2>

<input
type="text"
id="searchInput"
placeholder="Ism bo‘yicha qidirish"
onkeyup="searchAriza()"
/>

<select
id="filterStatus"
onchange="searchAriza()"
>

<option value="all">

Barcha status

</option>

<option value="Tasdiqlandi">

Tasdiqlangan

</option>

<option value="Jarayonda">

Jarayonda

</option>

</select>

</div>

<div
class="list"
id="royxat"
>

</div>

<script>

function loadArizalar(){

fetch('/arizalar')

.then(res=>res.json())

.then(data=>{

document.getElementById(
'jami'
).innerText =
data.length;

const approved =
data.filter(
a=>a.status==='Tasdiqlandi'
).length;

const pending =
data.filter(
a=>a.status==='Jarayonda'
).length;

document.getElementById(
'tasdiq'
).innerText =
approved;

document.getElementById(
'pending'
).innerText =
pending;

const users =
new Set(
data.map(a=>a.user)
);

document.getElementById(
'users'
).innerText =
users.size;

let html='';

data.forEach(item=>{

html += `

<div class="item">

<b>

👤 ${item.ism}

</b>

<br><br>

📌 Tur:
${item.tur}

<br><br>

📊 Status:
${item.status}

<br><br>

🧑 User:
${item.user}

<br><br>

<a
href="/uploads/${item.file}"
target="_blank"
>

📄 Hujjatni ko'rish

</a>

<div class="buttons">

<button
class="approve"
onclick="tasdiqlash(
'${item._id}'
)"
>

✅ Tasdiqlash

</button>

<button
class="pending"
onclick="jarayon()"
>

⏳ Jarayonda

</button>

<button
class="delete"
onclick="ochirish(
'${item._id}'
)"
>

🗑 O‘chirish

</button>

</div>

</div>

`;

});

document.getElementById(
'royxat'
).innerHTML =
html;

drawChart(
approved,
pending
);

});

}

function drawChart(
approved,
pending
){

const ctx =
document.getElementById(
'myChart'
);

new Chart(ctx,{

type:'doughnut',

data:{

labels:[
'Tasdiqlangan',
'Jarayonda'
],

datasets:[{

data:[
approved,
pending
],

backgroundColor:[
'#22c55e',
'#f59e0b'
]

}]

}

});

}

function searchAriza(){

const search =
document.getElementById(
'searchInput'
).value.toLowerCase();

const status =
document.getElementById(
'filterStatus'
).value;

const items =
document.querySelectorAll(
'.item'
);

items.forEach(item=>{

const text =
item.innerText.toLowerCase();

const statusMatch =
status === 'all'
|| text.includes(
status.toLowerCase()
);

const searchMatch =
text.includes(search);

if(
searchMatch
&&
statusMatch
){

item.style.display =
'block';

}else{

item.style.display =
'none';

}

});

}

function tasdiqlash(id){

fetch('/api/ariza/' + id,{

method:'PUT'

})

.then(res=>res.json())

.then(data=>{

alert(
'Tasdiqlandi'
);

location.reload();

});

}

function jarayon(){

alert(
'Jarayonda'
);

}

function ochirish(id){

fetch('/api/ariza/' + id,{

method:'DELETE'

})

.then(res=>res.json())

.then(data=>{

alert(
'O‘chirildi'
);

location.reload();

});

}

function logout(){

localStorage.removeItem(
'adminToken'
);

window.location.href =
'/login.html';

}

loadArizalar();

</script>

</body>
</html>
