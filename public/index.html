<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Raqamli Mahalla</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#f4f6f9;
    }

    header{
      background:#2563eb;
      color:white;
      padding:20px;
      text-align:center;
      font-size:28px;
      font-weight:bold;
    }

    .container{
      max-width:700px;
      margin:auto;
      padding:20px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    input, select{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:8px;
      border:1px solid #ccc;
      font-size:16px;
    }

    button{
      padding:12px 18px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;
      margin-top:10px;
    }

    .send{
      background:#2563eb;
      color:white;
      width:100%;
    }

    .delete{
      background:red;
      color:white;
    }

    .approve{
      background:green;
      color:white;
      margin-right:10px;
    }

    .ariza{
      background:#fff;
      padding:15px;
      border-radius:10px;
      margin-top:15px;
      box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }

    h2{
      margin-top:0;
    }
  </style>
</head>

<body>

<header>
  Raqamli Mahalla
</header>

<div class="container">

  <div class="card">
    <h2>Ariza yuborish</h2>

    <input type="text" id="ism" placeholder="Ismingiz">

    <select id="tur">
      <option>Nafaqa</option>
      <option>Yordam</option>
      <option>Subsidiya</option>
    </select>

    <button class="send" onclick="yuborish()">
      Yuborish
    </button>
  </div>

  <div class="card">
    <h2>Arizalar</h2>

    <div id="royxat"></div>
  </div>

</div>

<script>

let arizalar = [];

function chiqarish(){
  let royxat = document.getElementById("royxat");

  royxat.innerHTML = "";

  arizalar.forEach(ariza => {

    royxat.innerHTML += `
      <div class="ariza">
        <h3>${ariza.ism}</h3>

        <p>Tur: ${ariza.tur}</p>

        <p>Status: ${ariza.status}</p>

        <button class="approve" onclick="tasdiqlash(${ariza.id})">
          Tasdiqlash
        </button>

        <button class="delete" onclick="ochirish(${ariza.id})">
          O'chirish
        </button>
      </div>
    `;
  });
}

function yuborish(){

  let ism = document.getElementById("ism").value;
  let tur = document.getElementById("tur").value;

  fetch("/api/ariza",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      ism,
      tur
    })
  })
  .then(res => res.json())
  .then(data => {

    alert(data.message);

    yuklash();

  });

}

function yuklash(){

  fetch("/api/arizalar")
  .then(res => res.json())
  .then(data => {

    arizalar = data;

    chiqarish();

  });

}

function ochirish(id){

  fetch("/api/ariza/" + id,{
    method:"DELETE"
  })
  .then(() => {
    yuklash();
  });

}

function tasdiqlash(id){

  fetch("/api/ariza/" + id,{
    method:"PUT"
  })
  .then(() => {
    yuklash();
  });

}

yuklash();

</script>

</body>
</html>
