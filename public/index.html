<script>

let arizalar = [];

let currentLang = "uz";

const texts = {

  uz:{
    login:"Admin Login",
    kirish:"Kirish",
    stat:"📊 Statistika",
    jami:"Jami arizalar",
    tasdiq:"Tasdiqlangan",
    kutish:"Kutilmoqda",
    ariza:"Ariza yuborish",
    ism:"Ismingiz",
    send:"Yuborish",
    list:"Arizalar",
    tur:"Tur",
    status:"Status",
    approve:"Tasdiqlash",
    delete:"O'chirish",

    nafaqa:"Nafaqa",
    yordam:"Yordam",
    subsidiya:"Subsidiya"
  },

  ru:{
    login:"Вход Админа",
    kirish:"Войти",
    stat:"📊 Статистика",
    jami:"Всего заявок",
    tasdiq:"Подтверждено",
    kutish:"Ожидается",
    ariza:"Отправить заявку",
    ism:"Ваше имя",
    send:"Отправить",
    list:"Заявки",
    tur:"Тип",
    status:"Статус",
    approve:"Подтвердить",
    delete:"Удалить",

    nafaqa:"Пособие",
    yordam:"Помощь",
    subsidiya:"Субсидия"
  },

  en:{
    login:"Admin Login",
    kirish:"Login",
    stat:"📊 Statistics",
    jami:"Total applications",
    tasdiq:"Approved",
    kutish:"Pending",
    ariza:"Send Application",
    ism:"Your name",
    send:"Send",
    list:"Applications",
    tur:"Type",
    status:"Status",
    approve:"Approve",
    delete:"Delete",

    nafaqa:"Allowance",
    yordam:"Help",
    subsidiya:"Subsidy"
  }

};

function darkMode(){

  document.body.classList.toggle("dark");

}

function til(lang){

  currentLang = lang;

  let t = texts[lang];

  document.getElementById("loginTitle").innerText = t.login;

  document.getElementById("loginBtn").innerText = t.kirish;

  document.getElementById("statTitle").innerText = t.stat;

  document.getElementById("jamiText").innerHTML =
    `${t.jami}: <span id="jami">${arizalar.length}</span>`;

  document.getElementById("tasdiqText").innerHTML =
    `${t.tasdiq}: <span id="tasdiq">0</span>`;

  document.getElementById("kutishText").innerHTML =
    `${t.kutish}: <span id="kutish">0</span>`;

  document.getElementById("arizaTitle").innerText = t.ariza;

  document.getElementById("ism").placeholder = t.ism;

  document.getElementById("sendBtn").innerText = t.send;

  document.getElementById("listTitle").innerText = t.list;

  document.getElementById("tur").innerHTML = `
    <option>${t.nafaqa}</option>
    <option>${t.yordam}</option>
    <option>${t.subsidiya}</option>
  `;

  chiqarish();

}

function kirish(){

  let parol = document.getElementById("parol").value;

  if(parol === "1234"){

    document.getElementById("login").style.display = "none";

    document.getElementById("asosiy").style.display = "block";

  }else{

    alert("Parol noto'g'ri");

  }

}

function chiqarish(){

  let royxat = document.getElementById("royxat");

  royxat.innerHTML = "";

  let tasdiq = 0;

  let kutish = 0;

  arizalar.forEach(ariza => {

    if(ariza.status === "approved"){
      tasdiq++;
    }else{
      kutish++;
    }

    royxat.innerHTML += `
      <div class="ariza">

        <h3>${ariza.ism}</h3>

        <p>${texts[currentLang].tur}: ${ariza.tur}</p>

        <p>${texts[currentLang].status}: ${ariza.status}</p>

        <button class="approve" onclick="tasdiqlash(${ariza.id})">
          ${texts[currentLang].approve}
        </button>

        <button class="delete" onclick="ochirish(${ariza.id})">
          ${texts[currentLang].delete}
        </button>

      </div>
    `;

  });

  document.getElementById("jami").innerText = arizalar.length;

  document.getElementById("tasdiq").innerText = tasdiq;

  document.getElementById("kutish").innerText = kutish;

}

function yuborish(){

  let ism = document.getElementById("ism").value;

  let tur = document.getElementById("tur").value;

  fetch("/api/ariza",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      ism,
      tur
    })
  })
  .then(res => res.json())
  .then(data => {

    alert(data.message);

    yuklash();

  });

}

function yuklash(){

  fetch("/api/arizalar")
  .then(res => res.json())
  .then(data => {

    arizalar = data;

    chiqarish();

  });

}

function ochirish(id){

  fetch("/api/ariza/" + id,{
    method:"DELETE"
  })
  .then(() => {
    yuklash();
  });

}

function tasdiqlash(id){

  fetch("/api/ariza/" + id,{
    method:"PUT"
  })
  .then(() => {
    yuklash();
  });

}

yuklash();

</script>
