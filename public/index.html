<script>

function register(){

fetch('/api/register',{

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({

login:document.getElementById('loginUser').value,
password:document.getElementById('loginPass').value

})

})
.then(res=>res.json())
.then(data=>{

alert(data.message);

});

}

function login(){

fetch('/api/login',{

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({

login:document.getElementById('loginUser').value,
password:document.getElementById('loginPass').value

})

})
.then(res=>res.json())
.then(data=>{

alert(data.message);

if(data.user){

document.getElementById('authBox')
.style.display='none';

}

});

}

let til = "uz";

let arizalar = [];

let currentUser = "";

function foydalanuvchiKirish(){

const ism =
document.getElementById("userName").value;

if(ism === ""){

alert("Ism kiriting");

return;

}

currentUser = ism;

document.getElementById("userLogin")
.style.display = "none";

document.getElementById("login")
.style.display = "block";

}

function kirish(){

let parol =
document.getElementById("parol").value;

if(parol === "1234"){

document.getElementById("login")
.style.display = "none";

document.getElementById("asosiy")
.style.display = "block";

loadArizalar();

}else{

alert("Parol xato");

}

}

function fileName(){

const file =
document.getElementById("hujjat").files[0];

if(file){

document.getElementById("chooseBtn")
.innerText = "✅ " + file.name;

}

}

function yuborish(){

const ism =
document.getElementById("ism").value;

const tur =
document.getElementById("tur").value;

const file =
document.getElementById("hujjat").files[0];

fetch('/api/ariza',{

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({

ism,
tur,
user:currentUser,
hujjat:file ? file.name : "Yuklanmagan"

})

})
.then(res=>res.json())
.then(data=>{

document.getElementById("notification")
.innerHTML =
"✅ " + data.message;

loadArizalar();

});

}

function loadArizalar(){

fetch('/api/arizalar')
.then(res=>res.json())
.then(data=>{

arizalar = data;

render();

});

}

function render(){

let royxat = "";

let jami = arizalar.length;

let tasdiq =
arizalar.filter(a=>a.status==="approved").length;

let kutish =
arizalar.filter(a=>a.status==="pending").length;

document.getElementById("jami")
.innerText = jami;

document.getElementById("tasdiq")
.innerText = tasdiq;

document.getElementById("kutish")
.innerText = kutish;

arizalar.forEach((a)=>{

royxat += `

<div class="item">

<b>${a.ism}</b><br>

Tur: ${a.tur}<br><br>

Status: ${a.status}<br><br>

📎 Hujjat: ${a.hujjat}<br><br>

<button onclick="tasdiqlash('${a._id}')">
Tasdiqlash
</button>

<button onclick="ochirish('${a._id}')">
O'chirish
</button>

</div>

`;

});

document.getElementById("royxat")
.innerHTML = royxat;

}

function tasdiqlash(id){

fetch('/api/ariza/' + id,{

method:'PUT'

})
.then(()=>{

loadArizalar();

document.getElementById("notification")
.innerHTML =
"✅ Ariza tasdiqlandi";

});

}

function ochirish(id){

fetch('/api/ariza/' + id,{

method:'DELETE'

})
.then(()=>{

loadArizalar();

document.getElementById("notification")
.innerHTML =
"🗑 Ariza o'chirildi";

});

}

function darkMode(){

document.body.classList.toggle("dark");

}

function changeLang(lang){

til = lang;

if(lang === "uz"){

document.getElementById("statTitle")
.innerText = "📊 Statistika";

document.getElementById("arizaTitle")
.innerText = "Ariza yuborish";

document.getElementById("listTitle")
.innerText = "Mening arizalarim";

}

if(lang === "ru"){

document.getElementById("statTitle")
.innerText = "📊 Статистика";

document.getElementById("arizaTitle")
.innerText = "Отправить заявку";

document.getElementById("listTitle")
.innerText = "Мои заявки";

}

if(lang === "en"){

document.getElementById("statTitle")
.innerText = "📊 Statistics";

document.getElementById("arizaTitle")
.innerText = "Send Application";

document.getElementById("listTitle")
.innerText = "My Applications";

}

}

</script>
