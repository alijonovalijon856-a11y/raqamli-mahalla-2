<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raqamli Mahalla</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#f4f6f9;
  transition:0.3s;
}

header{
  background:#2563eb;
  color:white;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

.logo{
  font-size:28px;
  font-weight:bold;
}

.top-buttons{
  display:flex;
  gap:10px;
}

.top-buttons button{
  border:none;
  border-radius:8px;
  padding:10px 15px;
  cursor:pointer;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input, select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}

.send{
  background:#2563eb;
  color:white;
  width:100%;
}

.approve{
  background:green;
  color:white;
}

.delete{
  background:red;
  color:white;
}

.ariza{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
}

#login{
  max-width:400px;
  margin:80px auto;
  background:white;
  padding:30px;
  border-radius:12px;
  text-align:center;
}

.dark{
  background:#111827;
  color:white;
}

.dark .card,
.dark .ariza,
.dark #login{
  background:#1f2937;
  color:white;
}

.dark input,
.dark select{
  background:#374151;
  color:white;
  border:none;
}

</style>
</head>

<body>

<header>

<div class="logo">
🏛 Raqamli Mahalla
</div>

<div class="top-buttons">

<button onclick="changeLang('uz')">🇺🇿 UZ</button>

<button onclick="changeLang('ru')">🇷🇺 RU</button>

<button onclick="changeLang('en')">🇬🇧 EN</button>

<button onclick="darkMode()">🌙</button>

</div>

</header>

<div id="login">

<h2 id="loginTitle">Admin Login</h2>

<input type="password" id="parol" placeholder="Parol">

<button onclick="kirish()" id="loginBtn">
Kirish
</button>

</div>

<div class="container" id="asosiy" style="display:none;">

<div class="card">

<h2 id="statTitle">📊 Statistika</h2>

<p id="jamiText">Jami arizalar: <span id="jami">0</span></p>

<p id="tasdiqText">Tasdiqlangan: <span id="tasdiq">0</span></p>

<p id="kutishText">Kutilmoqda: <span id="kutish">0</span></p>

</div>

<div class="card">

<h2 id="arizaTitle">Ariza yuborish</h2>

<input type="text" id="ism" placeholder="Ismingiz">

<select id="tur">
<option>Nafaqa</option>
<option>Yordam</option>
<option>Subsidiya</option>
</select>

<button class="send" id="sendBtn" onclick="yuborish()">
Yuborish
</button>

</div>

<div class="card">

<h2 id="listTitle">Arizalar</h2>

<div id="royxat"></div>

</div>

<div class="card">

<h2>🤖 AI Yordamchi</h2>

<input type="text" id="savol" placeholder="Savol yozing">

<button onclick="javobBer()" class="send">
Yuborish
</button>

<div id="javob" style="margin-top:20px;font-weight:bold;white-space:pre-line;"></div>

</div>

</div>

<script>

let arizalar = [];

let currentLang = "uz";

const langs = {

uz:{
login:"Admin Login",
enter:"Kirish",
stat:"📊 Statistika",
all:"Jami arizalar",
approved:"Tasdiqlangan",
pending:"Kutilmoqda",
sendApplication:"Ariza yuborish",
name:"Ismingiz",
send:"Yuborish",
apps:"Arizalar",
type:"Tur",
status:"Status",
approve:"Tasdiqlash",
delete:"O'chirish",
benefit:"Nafaqa",
help:"Yordam",
subsidy:"Subsidiya"
},

ru:{
login:"Вход Админа",
enter:"Войти",
stat:"📊 Статистика",
all:"Всего заявок",
approved:"Подтверждено",
pending:"Ожидается",
sendApplication:"Отправить заявку",
name:"Ваше имя",
send:"Отправить",
apps:"Заявки",
type:"Тип",
status:"Статус",
approve:"Подтвердить",
delete:"Удалить",
benefit:"Пособие",
help:"Помощь",
subsidy:"Субсидия"
},

en:{
login:"Admin Login",
enter:"Login",
stat:"📊 Statistics",
all:"Total applications",
approved:"Approved",
pending:"Pending",
sendApplication:"Send Application",
name:"Your name",
send:"Send",
apps:"Applications",
type:"Type",
status:"Status",
approve:"Approve",
delete:"Delete",
benefit:"Allowance",
help:"Help",
subsidy:"Subsidy"
}

};

function darkMode(){
document.body.classList.toggle("dark");
}

function changeLang(lang){

currentLang = lang;

let t = langs[lang];

document.getElementById("loginTitle").innerText = t.login;
document.getElementById("loginBtn").innerText = t.enter;

document.getElementById("statTitle").innerText = t.stat;

document.getElementById("jamiText").innerHTML =
`${t.all}: <span id="jami">${arizalar.length}</span>`;

document.getElementById("tasdiqText").innerHTML =
`${t.approved}: <span id="tasdiq">0</span>`;

document.getElementById("kutishText").innerHTML =
`${t.pending}: <span id="kutish">0</span>`;

document.getElementById("arizaTitle").innerText = t.sendApplication;

document.getElementById("ism").placeholder = t.name;

document.getElementById("sendBtn").innerText = t.send;

document.getElementById("listTitle").innerText = t.apps;

document.getElementById("tur").innerHTML = `
<option>${t.benefit}</option>
<option>${t.help}</option>
<option>${t.subsidy}</option>
`;

chiqarish();

}

function kirish(){

let parol = document.getElementById("parol").value;

if(parol === "1234"){

document.getElementById("login").style.display = "none";

document.getElementById("asosiy").style.display = "block";

}else{

alert("Parol noto'g'ri");

}

}

function chiqarish(){

let royxat = document.getElementById("royxat");

royxat.innerHTML = "";

let approved = 0;
let pending = 0;

arizalar.forEach(ariza => {

if(ariza.status === "approved"){
approved++;
}else{
pending++;
}

royxat.innerHTML += `
<div class="ariza">

<h3>${ariza.ism}</h3>

<p>${langs[currentLang].type}: ${ariza.tur}</p>

<p>${langs[currentLang].status}: ${ariza.status}</p>

<button class="approve" onclick="tasdiqlash(${ariza.id})">
${langs[currentLang].approve}
</button>

<button class="delete" onclick="ochirish(${ariza.id})">
${langs[currentLang].delete}
</button>

</div>
`;

});

document.getElementById("jami").innerText = arizalar.length;
document.getElementById("tasdiq").innerText = approved;
document.getElementById("kutish").innerText = pending;

}

function yuborish(){

let ism = document.getElementById("ism").value;

let tur = document.getElementById("tur").value;

fetch("/api/ariza",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
ism,
tur
})
})
.then(res => res.json())
.then(data => {

alert(data.message);

yuklash();

});

}

function yuklash(){

fetch("/api/arizalar")
.then(res => res.json())
.then(data => {

arizalar = data;

chiqarish();

});

}

function ochirish(id){

fetch("/api/ariza/" + id,{
method:"DELETE"
})
.then(() => {
yuklash();
});

}

function tasdiqlash(id){

fetch("/api/ariza/" + id,{
method:"PUT"
})
.then(() => {
yuklash();
});

}

function javobBer(){

let savol = document
.getElementById("savol")
.value
.toLowerCase();

let javob = "";

if(savol.includes("nafaqa")){

javob = `📌 Nafaqa olish uchun kerak:

✅ Pasport
✅ Daromad ma'lumoti
✅ Oilaviy holat ma'lumoti
✅ Mahalla tavsiyasi

📍 Mahalla idorasiga murojaat qiling.`;

}
else if(savol.includes("subsidiya")){

javob = `📌 Subsidiya uchun kerak:

✅ Pasport
✅ Uy joy hujjati
✅ Daromad ma'lumoti
✅ Ariza formasi

📍 Tuman hokimligiga murojaat qiling.`;

}
else if(savol.includes("yordam")){

javob = `📌 Moddiy yordam uchun kerak:

✅ Pasport
✅ Oilaviy ma'lumot
✅ Mahalla tasdig'i

📍 Mahalla markaziga murojaat qiling.`;

}
else{

javob = `🤖 Savol topilmadi.

Quyidagilarni yozing:

• nafaqa
• subsidiya
• yordam`;

}

document.getElementById("javob").innerText = javob;

}

yuklash();

</script>

</body>
</html>
