<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Raqamli Mahalla</title>

  <style>

    body{
      margin:0;
      font-family:Arial;
      background:#f4f6f9;
      transition:0.3s;
    }

    header{
      background:#2563eb;
      color:white;
      padding:20px;
      font-size:30px;
      font-weight:bold;

      display:flex;
      justify-content:space-between;
      align-items:center;

      padding-left:30px;
      padding-right:30px;
    }

    .container{
      max-width:700px;
      margin:auto;
      padding:20px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      transition:0.3s;
    }

    input, select{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:8px;
      border:1px solid #ccc;
      font-size:16px;
      box-sizing:border-box;
    }

    button{
      padding:12px 18px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;
      margin-top:10px;
    }

    .send{
      background:#2563eb;
      color:white;
      width:100%;
    }

    .approve{
      background:green;
      color:white;
      margin-right:10px;
    }

    .delete{
      background:red;
      color:white;
    }

    .ariza{
      background:white;
      padding:15px;
      border-radius:10px;
      margin-top:15px;
      box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }

    #login{
      max-width:400px;
      margin:80px auto;
      background:white;
      padding:30px;
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      text-align:center;
    }

    #login button{
      width:100%;
      background:#2563eb;
      color:white;
    }

    .dark{
      background:#111827;
      color:white;
    }

    .dark .card{
      background:#1f2937;
      color:white;
    }

    .dark .ariza{
      background:#374151;
      color:white;
    }

    .dark input,
    .dark select{
      background:#374151;
      color:white;
      border:none;
    }

    #darkBtn{
      background:white;
      border:none;
      border-radius:8px;
      padding:10px;
      cursor:pointer;
      font-size:18px;
    }

  </style>
</head>

<body>

<header>

  🏛 Raqamli Mahalla

  <button onclick="darkMode()" id="darkBtn">
    🌙
  </button>

</header>

<div id="login">

  <h2>Admin Login</h2>

  <input type="password" id="parol" placeholder="Parol">

  <button onclick="kirish()">
    Kirish
  </button>

</div>

<div class="container" id="asosiy" style="display:none;">

  <div class="card">

    <h2>📊 Statistika</h2>

    <p>Jami arizalar: <span id="jami">0</span></p>

    <p>Tasdiqlangan: <span id="tasdiq">0</span></p>

    <p>Kutilmoqda: <span id="kutish">0</span></p>

  </div>

  <div class="card">

    <h2>Ariza yuborish</h2>

    <input type="text" id="ism" placeholder="Ismingiz">

    <select id="tur">
      <option>Nafaqa</option>
      <option>Yordam</option>
      <option>Subsidiya</option>
    </select>

    <button class="send" onclick="yuborish()">
      Yuborish
    </button>

  </div>

  <div class="card">

    <h2>Arizalar</h2>

    <div id="royxat"></div>

  </div>

</div>

<script>

let arizalar = [];

function darkMode(){

  document.body.classList.toggle("dark");

}

function kirish(){

  let parol = document.getElementById("parol").value;

  if(parol === "1234"){

    document.getElementById("login").style.display = "none";

    document.getElementById("asosiy").style.display = "block";

  }else{

    alert("Parol noto'g'ri");

  }

}

function chiqarish(){

  let royxat = document.getElementById("royxat");

  royxat.innerHTML = "";

  let tasdiq = 0;

  let kutish = 0;

  arizalar.forEach(ariza => {

    if(ariza.status === "approved"){
      tasdiq++;
    }else{
      kutish++;
    }

    royxat.innerHTML += `
      <div class="ariza">

        <h3>${ariza.ism}</h3>

        <p>Tur: ${ariza.tur}</p>

        <p>Status: ${ariza.status}</p>

        <button class="approve" onclick="tasdiqlash(${ariza.id})">
          Tasdiqlash
        </button>

        <button class="delete" onclick="ochirish(${ariza.id})">
          O'chirish
        </button>

      </div>
    `;

  });

  document.getElementById("jami").innerText = arizalar.length;

  document.getElementById("tasdiq").innerText = tasdiq;

  document.getElementById("kutish").innerText = kutish;

}

function yuborish(){

  let ism = document.getElementById("ism").value;

  let tur = document.getElementById("tur").value;

  fetch("/api/ariza",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      ism,
      tur
    })
  })
  .then(res => res.json())
  .then(data => {

    alert(data.message);

    yuklash();

  });

}

function yuklash(){

  fetch("/api/arizalar")
  .then(res => res.json())
  .then(data => {

    arizalar = data;

    chiqarish();

  });

}

function ochirish(id){

  fetch("/api/ariza/" + id,{
    method:"DELETE"
  })
  .then(() => {
    yuklash();
  });

}

function tasdiqlash(id){

  fetch("/api/ariza/" + id,{
    method:"PUT"
  })
  .then(() => {
    yuklash();
  });

}

yuklash();

</script>

</body>
</html>
