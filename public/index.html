<!DOCTYPE html>
<html lang="uz">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Raqamli Mahalla AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:
linear-gradient(
135deg,
#020617,
#0f172a,
#111827
);

min-height:100vh;

padding:20px;

padding-bottom:120px;

color:white;

overflow-x:hidden;

}

.container{

max-width:1300px;

margin:auto;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

padding:20px;

border-radius:25px;

background:
rgba(255,255,255,0.06);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,0.1);

margin-bottom:30px;

flex-wrap:wrap;

gap:20px;

}

.logo{

font-size:34px;

font-weight:bold;

background:
linear-gradient(
90deg,
#38bdf8,
#818cf8
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(340px,1fr));

gap:25px;

}

.card{

background:
rgba(255,255,255,0.06);

border:
1px solid rgba(255,255,255,0.1);

border-radius:30px;

padding:28px;

backdrop-filter:blur(18px);

box-shadow:
0 10px 40px rgba(0,0,0,0.4);

transition:0.3s;

}

.card:hover{

transform:
translateY(-6px);

}

h2{

margin-bottom:20px;

font-size:26px;

}

input,
select,
textarea{

width:100%;

padding:15px;

margin-top:12px;

border:none;

outline:none;

border-radius:15px;

background:
rgba(255,255,255,0.08);

color:white;

font-size:16px;

}

option{

background:#0f172a;

}

input::placeholder,
textarea::placeholder{

color:#ddd;

}

button{

width:100%;

padding:15px;

margin-top:18px;

border:none;

border-radius:16px;

font-size:16px;

font-weight:bold;

cursor:pointer;

background:
linear-gradient(
90deg,
#2563eb,
#7c3aed
);

color:white;

transition:0.3s;

}

button:hover{

transform:scale(1.02);

opacity:0.95;

}

.ai-box{

height:150px;

resize:none;

}

.ai-result{

margin-top:15px;

padding:18px;

border-radius:18px;

background:
rgba(255,255,255,0.08);

line-height:1.8;

min-height:120px;

font-size:17px;

}

.footer{

margin-top:50px;

text-align:center;

opacity:0.7;

font-size:15px;

}

.bottom-nav{

position:fixed;

bottom:15px;

left:50%;

transform:translateX(-50%);

width:95%;

max-width:500px;

display:flex;

justify-content:space-around;

align-items:center;

padding:15px;

border-radius:25px;

background:
rgba(255,255,255,0.08);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,0.1);

box-shadow:
0 8px 30px rgba(0,0,0,0.4);

z-index:999;

}

.nav-item{

text-align:center;

font-size:15px;

cursor:pointer;

opacity:0.8;

transition:0.3s;

}

.nav-item:hover{

transform:translateY(-5px);

opacity:1;

}

.active{

color:#38bdf8;

font-weight:bold;

}

.typing{

display:inline-block;

overflow:hidden;

border-right:2px solid white;

white-space:nowrap;

animation:
typing 3s steps(40,end),
blink 0.8s infinite;

}

@keyframes typing{

from{
width:0;
}

to{
width:100%;
}

}

@keyframes blink{

50%{
border-color:transparent;
}

}

@media(max-width:700px){

.logo{

font-size:26px;

}

body{

padding:15px;

padding-bottom:120px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="logo">

🤖 Raqamli Mahalla AI

</div>

</div>

<div class="grid">

<div class="card">

<h2>

🤖 AI Assistant

</h2>

<textarea
class="ai-box"
id="aiInput"
placeholder="AI ga savol yozing"
></textarea>

<button onclick="aiJavob()">

AI Savol Yuborish

</button>

<div
class="ai-result"
id="aiResult"
>

🤖 AI sizning savolingizni kutmoqda...

</div>

</div>

<div class="card">

<h2>

📨 Tezkor xizmatlar

</h2>

<button onclick="quick('nafaqa')">

Nafaqa haqida

</button>

<button onclick="quick('subsidiya')">

Subsidiya haqida

</button>

<button onclick="quick('moddiy yordam')">

Moddiy yordam

</button>

<button onclick="quick('ish')">

Ish so‘rovi

</button>

</div>

</div>

<div class="footer">

© 2026 Raqamli Mahalla AI System

</div>

</div>

<div class="bottom-nav">

<div
class="nav-item"
onclick="
window.location.href='/'
"
>

🏠
<br>
Asosiy

</div>

<div class="nav-item active">

🤖
<br>
AI

</div>

<div
class="nav-item"
onclick="
window.location.href='/cabinet.html'
"
>

👤
<br>
Kabinet

</div>

<div
class="nav-item"
onclick="
window.location.href='/admin.html'
"
>

📊
<br>
Admin

</div>

</div>

<script>

function aiJavob(){

const savol =
document.getElementById(
'aiInput'
).value.toLowerCase();

const result =
document.getElementById(
'aiResult'
);

result.innerHTML =
'<span class="typing">🤖 AI fikrlamoqda...</span>';

setTimeout(()=>{

let javob = '';

if(
savol.includes('nafaqa')
){

javob =
'🤖 Nafaqa olish uchun pasport, oilaviy daromad va yashash joyi ma’lumotlari talab qilinadi.';

}

else if(
savol.includes('subsidiya')
){

javob =
'🤖 Subsidiya uchun uy-joy ma’lumotlari va oilaviy daromad kerak bo‘ladi.';

}

else if(
savol.includes('moddiy')
){

javob =
'🤖 Moddiy yordam mahalla komissiyasi tomonidan ko‘rib chiqiladi.';

}

else if(
savol.includes('ish')
){

javob =
'🤖 Ish so‘rovi uchun telefon raqam va mutaxassislik kerak bo‘ladi.';

}

else if(
savol.includes('salom')
){

javob =
'🤖 Assalomu alaykum 😊 Sizga qanday yordam bera olaman?';

}

else{

javob =
'🤖 Sizning savolingiz AI tomonidan tahlil qilindi. Yaqinda yanada aqlli ChatGPT tizimi ulanadi 🚀';

}

result.innerHTML =
javob;

},1500);

}

function quick(type){

document.getElementById(
'aiInput'
).value =
type;

aiJavob();

}

</script>

</body>

</html>
