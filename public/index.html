<script>

let currentUser = "";

function register(){

fetch('/api/register',{

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({

login:document.getElementById('loginUser').value,

password:document.getElementById('loginPass').value

})

})
.then(res=>res.json())
.then(data=>{

alert(data.message);

});

}

function login(){

fetch('/api/login',{

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({

login:document.getElementById('loginUser').value,

password:document.getElementById('loginPass').value

})

})
.then(res=>res.json())
.then(data=>{

alert(data.message);

if(data.user){

currentUser =
document.getElementById('loginUser').value;

loadArizalar();

}

});

}

function yuborish(){

const ism =
document.getElementById('ism').value;

const tur =
document.getElementById('tur').value;

fetch('/api/ariza',{

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({

ism,
tur,
user:currentUser,
hujjat:'Yuklanmagan'

})

})
.then(res=>res.json())
.then(data=>{

alert(data.message);

loadArizalar();

});

}

function loadArizalar(){

fetch('/api/arizalar/' + currentUser)

.then(res=>res.json())

.then(data=>{

let html = '';

for(let i=0;i<data.length;i++){

html += `

<div class="item">

<b>${data[i].ism}</b><br>

Tur: ${data[i].tur}<br>

Status: ${data[i].status}

</div>

`;

}

document.getElementById('royxat')
.innerHTML = html;

document.getElementById('jami')
.innerText = data.length;

});

}

function darkMode(){

document.body.classList.toggle('dark');

}

function changeLang(lang){

console.log(lang);

}

</script>
