<!DOCTYPE html>
<html lang="uz">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Raqamli Mahalla</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:
linear-gradient(
135deg,
#020617,
#0f172a,
#111827
);

min-height:100vh;

padding:30px;

color:white;

overflow-x:hidden;

}

.container{

max-width:1300px;

margin:auto;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

padding:20px;

border-radius:25px;

background:
rgba(255,255,255,0.06);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,0.1);

margin-bottom:30px;

flex-wrap:wrap;

gap:20px;

}

.logo{

font-size:34px;

font-weight:bold;

background:
linear-gradient(
90deg,
#38bdf8,
#818cf8
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

.langs{

display:flex;

gap:10px;

}

.lang{

padding:10px 16px;

border:none;

border-radius:12px;

background:
rgba(255,255,255,0.08);

color:white;

cursor:pointer;

transition:0.3s;

}

.lang:hover{

background:
rgba(255,255,255,0.2);

}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(340px,1fr));

gap:25px;

}

.card{

background:
rgba(255,255,255,0.06);

border:
1px solid rgba(255,255,255,0.1);

border-radius:30px;

padding:28px;

backdrop-filter:blur(18px);

box-shadow:
0 10px 40px rgba(0,0,0,0.4);

transition:0.3s;

}

.card:hover{

transform:
translateY(-6px);

}

h2{

margin-bottom:20px;

font-size:26px;

}

input,
select,
textarea{

width:100%;

padding:15px;

margin-top:12px;

border:none;

outline:none;

border-radius:15px;

background:
rgba(255,255,255,0.08);

color:white;

font-size:16px;

}

option{

background:#0f172a;

}

input::placeholder,
textarea::placeholder{

color:#ddd;

}

button{

width:100%;

padding:15px;

margin-top:18px;

border:none;

border-radius:16px;

font-size:16px;

font-weight:bold;

cursor:pointer;

background:
linear-gradient(
90deg,
#2563eb,
#7c3aed
);

color:white;

transition:0.3s;

}

button:hover{

transform:scale(1.02);

opacity:0.95;

}

.file-box{

margin-top:15px;

padding:18px;

border-radius:18px;

border:
2px dashed rgba(255,255,255,0.3);

background:
rgba(255,255,255,0.05);

text-align:center;

}

.stat{

font-size:50px;

font-weight:bold;

margin-top:15px;

color:#38bdf8;

}

.ai-box{

height:130px;

resize:none;

}

.footer{

margin-top:50px;

text-align:center;

opacity:0.7;

font-size:15px;

}

.live{

display:flex;

flex-direction:column;

gap:12px;

}

.msg{

padding:12px;

border-radius:14px;

background:
rgba(255,255,255,0.08);

}

.top-badge{

display:inline-block;

padding:8px 14px;

border-radius:999px;

background:
rgba(56,189,248,0.15);

color:#38bdf8;

margin-bottom:15px;

font-size:14px;

}

.ai-result{

margin-top:15px;

padding:15px;

border-radius:16px;

background:
rgba(255,255,255,0.08);

line-height:1.8;

min-height:80px;

}

@media(max-width:700px){

.logo{

font-size:26px;

}

body{

padding:15px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="logo">

🏛 Raqamli Mahalla

</div>

<div class="langs">

<button
class="lang"
onclick="setLang('uz')"
>

🇺🇿 UZ

</button>

<button
class="lang"
onclick="setLang('ru')"
>

🇷🇺 RU

</button>

<button
class="lang"
onclick="setLang('en')"
>

🇬🇧 EN

</button>

</div>

</div>

<div class="grid">

<div class="card">

<div class="top-badge">

AI Powered Government Platform

</div>

<h2 id="arizaTitle">

📨 Ariza yuborish

</h2>

<input
type="text"
id="ism"
placeholder="Ismingiz"
/>

<select id="tur">

<option>Nafaqa</option>

<option>Moddiy yordam</option>

<option>Subsidiya</option>

<option>Ish so‘rovi</option>

<option>Kommunal yordam</option>

<option>Davolanish yordami</option>

</select>

<div class="file-box">

📎 Hujjat yuklash

<input
type="file"
id="file"
/>

</div>

<button onclick="yuborish()">

Yuborish

</button>

</div>

<div class="card">

<h2 id="statTitle">

📊 Statistika

</h2>

<div class="stat" id="count">

128

</div>

<p id="statText">

Bugungi arizalar

</p>

</div>

<div class="card">

<h2>

🤖 AI Assistant

</h2>

<textarea
class="ai-box"
id="aiInput"
placeholder="AI ga savol yozing"
></textarea>

<button onclick="aiJavob()">

AI Savol Yuborish

</button>

<div
class="ai-result"
id="aiResult"
>

🤖 AI sizning savolingizni kutmoqda...

</div>

</div>

<div class="card">

<h2>

💬 Live Chat

</h2>

<div class="live">

<div class="msg">

👨‍💼 Operator:
Assalomu alaykum

</div>

<div class="msg">

🧑 Siz:
Salom

</div>

</div>

<textarea
placeholder="Xabar yozing"
></textarea>

<button>

Xabar yuborish

</button>

</div>

</div>

<div class="footer">

© 2026 Raqamli Mahalla • Premium Edition

</div>

</div>

<script>

async function yuborish(){

const ism =
document.getElementById('ism').value;

const tur =
document.getElementById('tur').value;

const file =
document.getElementById('file').files[0];

const formData =
new FormData();

formData.append(
'ism',
ism
);

formData.append(
'tur',
tur
);

formData.append(
'file',
file
);

const user =
localStorage.getItem(
'user'
);

formData.append(
'user',
user
);

const res =
await fetch('/upload',{

method:'POST',

body:formData

});

const data =
await res.json();

alert(
data.message
);

const count =
document.getElementById('count');

count.innerHTML =
Number(count.innerHTML) + 1;

}

function aiJavob(){

const savol =
document.getElementById(
'aiInput'
).value.toLowerCase();

const result =
document.getElementById(
'aiResult'
);

let javob = '';

if(
savol.includes('nafaqa')
){

javob =
'🤖 Nafaqa olish uchun pasport, oilaviy daromad va yashash joyi ma’lumotlari kerak bo‘ladi.';

}

else if(
savol.includes('subsidiya')
){

javob =
'🤖 Subsidiya uchun uy-joy va oilaviy daromad ma’lumotlari talab qilinadi.';

}

else if(
savol.includes('moddiy yordam')
){

javob =
'🤖 Moddiy yordam mahalla komissiyasi tomonidan ko‘rib chiqiladi.';

}

else if(
savol.includes('ish')
){

javob =
'🤖 Ish so‘rovi uchun mutaxassisligingiz va telefon raqamingiz kerak bo‘ladi.';

}

else if(
savol.includes('salom')
){

javob =
'🤖 Assalomu alaykum 😊 Sizga qanday yordam bera olaman?';

}

else{

javob =
'🤖 Sizning savolingiz AI tomonidan tahlil qilinmoqda va tez orada javob beriladi.';

}

result.innerHTML =
javob;

}

function setLang(lang){

const logo =
document.querySelector('.logo');

const ariza =
document.getElementById('arizaTitle');

const stat =
document.getElementById('statTitle');

const statText =
document.getElementById('statText');

if(lang === 'uz'){

logo.innerHTML =
'🏛 Raqamli Mahalla';

ariza.innerHTML =
'📨 Ariza yuborish';

stat.innerHTML =
'📊 Statistika';

statText.innerHTML =
'Bugungi arizalar';

}

if(lang === 'ru'){

logo.innerHTML =
'🏛 Цифровая Махалля';

ariza.innerHTML =
'📨 Отправить заявку';

stat.innerHTML =
'📊 Статистика';

statText.innerHTML =
'Сегодняшние заявки';

}

if(lang === 'en'){

logo.innerHTML =
'🏛 Digital Mahalla';

ariza.innerHTML =
'📨 Submit Application';

stat.innerHTML =
'📊 Statistics';

statText.innerHTML =
'Today applications';

}

}

</script>

</body>

</html>
